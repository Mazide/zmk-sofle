  - board: eyelash_sofle_left
    artifact-name: eyelash_sofle_oled_hwtest_left
    cmake-args: "-DCONFIG_ZMK_DISPLAY=n -DCONFIG_DISPLAY=y -DCONFIG_SSD1306=y -DCONFIG_I2C=y -DCONFIG_ZMK_OLED_HW_TEST=y -DCONFIG_ZMK_RGB_UNDERGLOW=n -DCONFIG_ZMK_BACKLIGHT=n -DCONFIG_ZMK_POINTING=n"
